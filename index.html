<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepNow - AI-Powered Career Readiness Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- App Shell -->
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav id="sidebar" class="sidebar collapsed">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <rect width="28" height="28" rx="8" fill="var(--accent)"/>
                            <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="logo-text">PrepNow</span>
                </div>
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
            </div>
            <ul class="nav-links">
                <li><a href="#" data-page="dashboard" class="nav-link active" onclick="navigate('dashboard')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Dashboard</span>
                </a></li>
                <li><a href="#" data-page="assessment" class="nav-link" onclick="navigate('assessment')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                    <span>Assessment</span>
                </a></li>
                <li><a href="#" data-page="training" class="nav-link" onclick="navigate('training')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
                    <span>Training Plan</span>
                </a></li>
                <li><a href="#" data-page="interview" class="nav-link" onclick="navigate('interview')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                    <span>Voice Interview</span>
                </a></li>
                <li><a href="#" data-page="history" class="nav-link" onclick="navigate('history')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>History</span>
                </a></li>
                <li><a href="#" data-page="profile" class="nav-link" onclick="navigate('profile')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>Profile</span>
                </a></li>
                <li id="adminNavItem" style="display:none;"><a href="#" data-page="admin" class="nav-link" onclick="navigate('admin')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <span>Admin</span>
                </a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info" id="sidebarUserInfo">
                    <div class="user-avatar" id="sidebarAvatar">G</div>
                    <div class="user-details">
                        <span class="user-name" id="sidebarUserName">Guest</span>
                        <span class="user-role">Student</span>
                    </div>
                </div>
                <button class="btn-logout" id="logoutBtn" onclick="logout()" style="display:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="mainContent" class="main-content">
            <!-- Pages are rendered here dynamically -->
        </main>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal-overlay" style="display:none;">
        <div class="modal auth-modal">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg width="40" height="40" viewBox="0 0 28 28" fill="none">
                        <rect width="28" height="28" rx="8" fill="var(--accent)"/>
                        <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 id="authTitle">Welcome to PrepNow</h2>
                <p id="authSubtitle">Sign in to start your career preparation journey</p>
            </div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div id="registerFields" style="display:none;">
                    <div class="form-group">
                        <label for="authName">Full Name</label>
                        <input type="text" id="authName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="authMajor">Major</label>
                        <select id="authMajor">
                            <option value="">Select your major</option>
                            <option value="Information Systems">Information Systems</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Cybersecurity">Cybersecurity</option>
                            <option value="Data Science">Data Science</option>
                            <option value="Business Administration">Business Administration</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="authTargetRole">Target Job Role</label>
                        <input type="text" id="authTargetRole" placeholder="e.g., Software Developer, Data Analyst">
                    </div>
                </div>
                <div class="form-group">
                    <label for="authEmail">Email</label>
                    <input type="email" id="authEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="authPassword">Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="authSubmitBtn">Sign In</button>
            </form>
            <div class="auth-footer">
                <p id="authToggleText">Don't have an account? <a href="#" onclick="toggleAuthMode()" id="authToggleLink">Register</a></p>
            </div>
            <div class="auth-divider"><span>or</span></div>
            <button class="btn btn-outline btn-full" onclick="guestLogin()">Continue as Guest</button>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Configuration (edit config.js to add your API keys) -->
    <script src="js/config.js"></script>

    <!-- Supabase SDK (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/questions.js"></script>
    <script src="js/assessment.js"></script>
    <script src="js/training.js"></script>
    <script src="js/interview.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/history.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
